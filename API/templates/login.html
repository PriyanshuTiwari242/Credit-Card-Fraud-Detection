<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .logo{
            text-align:center;
            font-size:50px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#0f172a;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            background:#2563eb;
            color:white;
            border:none;
            padding:12px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:20px;
            font-size:14px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="logo">🔐</div>

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Login to access your Fraud Detection Dashboard
        </p>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="links">
            Don't have an account?
            <a href="/signup">Sign Up</a>
        </div>

        <div class="links">
            <a href="/">🏠 Back to Home</a>
        </div>

    </div>

</body>
</html>
