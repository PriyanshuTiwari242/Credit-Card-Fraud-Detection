<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 400px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0f172a;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">💳</div>

        <h2>Create Account</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <div class="links">
            Already have an account?
            <a href="/login">Login</a>
        </div>

        <div class="links">
            <a href="/">🏠 Back to Home</a>
        </div>

    </div>

</body>

</html>
